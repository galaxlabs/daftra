<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daftra</title>
  <link rel="stylesheet" href="/assets/daftra/css/daftra.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body class="daftra-shell">
  <div id="daftra-root"></div>
  <script>
    const e = React.createElement;
    const modules = {
      "Sales": ["Sales Invoice", "Sales Quotation", "Invoice Payment", "Recurring Invoice"],
      "Clients": ["Client", "Client Contact", "Appointment", "CRM Deal"],
      "Inventory": ["Product", "Warehouse", "Stock Entry", "Price List"],
      "Purchases": ["Supplier", "Purchase Order", "Purchase Invoice", "Supplier Payment"],
      "Accounting": ["Journal Entry", "Account", "Expense", "Income"],
      "HR": ["Employee", "Shift", "Employee Attendance", "Payroll Entry"],
      "POS": ["POS Session"],
      "Bookings": ["Booking"],
      "Time Tracking": ["Time Entry"],
      "Tax": ["Tax Setting"],
      "Settings": ["Daftra Settings"]
    };
    function api(method) {
      return fetch(`/api/method/${method}`, { credentials: "include" }).then((r) => r.json()).then((r) => r.message || r);
    }
    function App() {
      const [active, setActive] = React.useState("Sales");
      const [stats, setStats] = React.useState({});
      const [enabled, setEnabled] = React.useState({});
      React.useEffect(() => {
        api("daftra.api.dashboard_api.get_dashboard_stats").then(setStats).catch(() => setStats({}));
        api("daftra.api.dashboard_api.get_enabled_modules").then(setEnabled).catch(() => setEnabled({}));
      }, []);
      const cards = [
        ["Invoices", stats.total_invoices || 0],
        ["Sales", stats.total_invoice_amount || 0],
        ["Clients", stats.total_clients || 0],
        ["Products", stats.total_products || 0]
      ];
      return e("main", { className: "daftra-wrap" },
        e("section", { className: "daftra-topbar" },
          e("div", { className: "daftra-brand" }, e("div", { className: "daftra-mark" }, "D"), e("div", null, "Daftra ERP", e("div", { className: "daftra-muted" }, "Sales, inventory, accounting, HR, POS, bookings, tax"))),
          e("a", { className: "daftra-action", href: "/app/daftra-settings" }, "Settings")
        ),
        e("section", { className: "daftra-grid", style: { marginBottom: 18 } }, cards.map(([label, value]) => e("div", { className: "daftra-card", key: label }, e("span", null, label), e("strong", null, value)))),
        e("section", { className: "daftra-layout" },
          e("nav", { className: "daftra-nav daftra-panel" }, Object.keys(modules).map((m) => e("button", { key: m, className: active === m ? "is-active" : "", onClick: () => setActive(m) }, `${m}${enabled[m] === 0 ? " (off)" : ""}`))),
          e("div", { className: "daftra-panel" },
            e("h2", null, active),
            e("p", { className: "daftra-muted" }, "Open records, create transactions, review print layouts, and manage Daftra workflows."),
            e("div", { className: "daftra-actions" }, modules[active].map((dt) => e("a", { key: dt, className: "daftra-action secondary", href: `/app/${dt.toLowerCase().replaceAll(' ', '-')}` }, dt))),
            e("table", { className: "daftra-table" }, e("thead", null, e("tr", null, e("th", null, "Area"), e("th", null, "Primary Flow"), e("th", null, "Print/API Ready"))), e("tbody", null,
              e("tr", null, e("td", null, active), e("td", null, (modules[active] || []).join(", ")), e("td", null, "Yes"))
            ))
          )
        )
      );
    }
    ReactDOM.createRoot(document.getElementById("daftra-root")).render(e(App));
  </script>
</body>
</html>
